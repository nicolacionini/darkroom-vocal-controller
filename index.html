<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>DVC — Darkroom Vocal Controller</title>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--r:#FF2200;--r2:#991500;--r3:#3A0800;--r4:#1A0300;--bg:#000;}
html,body{background:var(--bg);color:var(--r);font-family:'Share Tech Mono',monospace;height:100%;overflow:hidden;-webkit-tap-highlight-color:transparent;}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.07) 2px,rgba(0,0,0,0.07) 4px);pointer-events:none;z-index:999;}

#overlay{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0.5rem;z-index:998;cursor:pointer;}
#overlay h1{font-family:'VT323',monospace;font-size:clamp(3rem,14vw,5.5rem);letter-spacing:0.3em;color:var(--r2);font-weight:400;}
#overlay .sub{font-size:0.65rem;letter-spacing:0.45em;color:var(--r3);text-transform:uppercase;}
#overlay .tap{font-size:0.75rem;letter-spacing:0.45em;color:var(--r);text-transform:uppercase;margin-top:2.5rem;animation:blink 1.4s ease-in-out infinite;}
#overlay .hint{margin-top:2.5rem;font-size:0.58rem;letter-spacing:0.18em;color:var(--r3);line-height:2.4;text-align:center;text-transform:uppercase;}
#overlay .hint span{color:var(--r2);}

#app{position:fixed;inset:0;display:grid;grid-template-rows:auto auto auto 1fr;padding:1.2rem 1.5rem 5.5rem;}
#area-name{font-family:'VT323',monospace;font-size:clamp(2rem,9vw,3.2rem);letter-spacing:0.3em;color:var(--r2);font-weight:400;line-height:1;}
#meta{font-size:0.62rem;letter-spacing:0.25em;color:var(--r3);margin-top:0.2rem;min-height:0.9rem;}
#meta.running{color:var(--r2);}
#timer{font-family:'VT323',monospace;font-size:clamp(5rem,30vw,12rem);line-height:0.9;color:var(--r);letter-spacing:0.02em;user-select:none;margin:0.2rem 0;}

#progress-wrap{height:2px;background:var(--r4);position:relative;margin:0.5rem 0 0.8rem;}
#progress-fill{position:absolute;top:0;left:0;height:100%;background:var(--r3);width:0%;transition:width 0.12s linear;}
#progress-head{position:absolute;top:-2px;width:6px;height:6px;background:var(--r);border-radius:50%;box-shadow:0 0 7px var(--r);left:0%;transform:translateX(-50%);transition:left 0.12s linear;}

#sequence{overflow-y:auto;overflow-x:hidden;scrollbar-width:thin;scrollbar-color:var(--r3) transparent;}
.step{display:flex;align-items:center;gap:0.7rem;padding:0.3rem 0;color:var(--r3);font-size:0.75rem;letter-spacing:0.14em;text-transform:uppercase;border-bottom:1px solid var(--r4);}
.step:last-child{border-bottom:none;}
.step.current{color:var(--r);}
.step.past{color:var(--r2);opacity:0.4;}
.dot{width:5px;height:5px;border-radius:50%;border:1px solid currentColor;flex-shrink:0;}
.step.current .dot{background:var(--r);border-color:var(--r);box-shadow:0 0 5px var(--r);}
.step.past .dot{background:currentColor;}
.step-idx{font-size:0.58rem;color:var(--r3);width:1.2rem;flex-shrink:0;text-align:right;}
.step.current .step-idx{color:var(--r2);}
.step-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.step-dur{flex-shrink:0;}

#statusbar{position:fixed;bottom:0;left:0;right:0;padding:0.8rem 1.5rem;background:var(--bg);border-top:1px solid var(--r4);display:flex;align-items:center;gap:0.8rem;}
.mic-ring{width:8px;height:8px;border-radius:50%;background:var(--r3);flex-shrink:0;transition:background 0.2s;}
.mic-ring.on{background:var(--r);animation:blink 1.1s ease-in-out infinite;box-shadow:0 0 6px var(--r);}
#heard{font-size:0.65rem;letter-spacing:0.16em;color:var(--r2);text-transform:uppercase;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;}
#cmd-flash{font-size:0.65rem;letter-spacing:0.22em;color:var(--r);text-transform:uppercase;flex-shrink:0;opacity:0;transition:opacity 0.1s;}
#cmd-flash.show{opacity:1;}

#btn-panel{display:none;position:fixed;bottom:2.9rem;left:0;right:0;grid-template-columns:repeat(6,1fr);gap:1px;background:var(--r4);border-top:1px solid var(--r3);}
#btn-panel button{background:var(--bg);border:none;color:var(--r2);font-family:'Share Tech Mono',monospace;font-size:0.56rem;letter-spacing:0.16em;padding:0.65rem 0.2rem;cursor:pointer;text-transform:uppercase;-webkit-tap-highlight-color:transparent;}
#btn-panel button:active{background:var(--r4);color:var(--r);}

@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.15;}}
</style>
</head>
<body>

<div id="overlay">
  <h1>DVC</h1>
  <div class="sub">Darkroom Vocal Controller</div>
  <div class="tap">Tap to activate</div>
  <div class="hint">
    <span>Dry</span> / <span>Wet</span> — select area<br>
    <span>Set [name] 1 30</span> — add interval (1 min 30 sec)<br>
    <span>Then</span> + <span>Set…</span> — chain intervals<br>
    <span>Go</span> — start &nbsp;·&nbsp; <span>Stop</span> — pause &nbsp;·&nbsp; <span>Back</span> — rewind<br>
    <span>[interval name]</span> — jump to that interval
  </div>
</div>

<div id="app">
  <div>
    <div id="area-name">—</div>
    <div id="meta">IDLE</div>
  </div>
  <div id="timer">00'00''</div>
  <div id="progress-wrap">
    <div id="progress-fill"></div>
    <div id="progress-head"></div>
  </div>
  <div id="sequence"></div>
</div>

<div id="statusbar">
  <div class="mic-ring" id="mic-ring"></div>
  <div id="heard">—</div>
  <div id="cmd-flash"></div>
</div>
<div id="btn-panel"></div>

<script>
// ════════════════════════════════════════════════
//  AUDIO
// ════════════════════════════════════════════════
var _ctx = null;
function ac(){
  if(!_ctx) _ctx = new (window.AudioContext || window.webkitAudioContext)();
  if(_ctx.state === 'suspended') _ctx.resume();
  return _ctx;
}
function tone(freq, dur, vol, type){
  vol = vol||0.3; type = type||'sine';
  var c=ac(), o=c.createOscillator(), g=c.createGain();
  o.connect(g); g.connect(c.destination);
  o.type=type; o.frequency.value=freq;
  g.gain.setValueAtTime(vol, c.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001, c.currentTime+dur);
  o.start(); o.stop(c.currentTime+dur);
}
var snd = {
  tick:   function(){ tone(500,0.04,0.10); },
  minute: function(){ tone(820,0.18,0.28); },
  end:    function(){
    tone(1100,0.20,0.50);
    setTimeout(function(){ tone(1100,0.20,0.50); },260);
    setTimeout(function(){ tone(1450,0.38,0.65); },520);
  }
};

// ════════════════════════════════════════════════
//  SPEECH SYNTHESIS
//  say() pauses the mic, speaks, then re-enables it.
//  A queue avoids race conditions between consecutive calls.
// ════════════════════════════════════════════════
var _sayQueue = [];
var _sayBusy  = false;

function say(text){
  _sayQueue.push(text);
  if(!_sayBusy) _sayNext();
}

function _sayNext(){
  if(!_sayQueue.length){ _sayBusy = false; return; }
  _sayBusy = true;
  var text = _sayQueue.shift();
  recAbortForTTS();
  var u = new SpeechSynthesisUtterance(text);
  u.lang='en-US'; u.rate=0.9; u.pitch=0.8; u.volume=1;
  u.onend = u.onerror = function(){
    setTimeout(function(){
      // Must clear _sayBusy BEFORE recResumeAfterTTS/recStart checks it
      _sayBusy = false;
      if(_sayQueue.length){ _sayBusy = true; _sayNext(); }
      else { recResumeAfterTTS(); }
    }, _isSafari ? 700 : 300);
  };
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

// ════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════
var S = {
  area:null, seqs:{dry:[],wet:[]}, mode:'idle',
  idx:0, elapsed:0, _tim:null, _wall:0, _base:0
};

// ════════════════════════════════════════════════
//  HELPERS
// ════════════════════════════════════════════════
function fmt(s){
  s = Math.max(0,Math.floor(s));
  var m=Math.floor(s/60), r=s%60;
  return (m<10?'0':'')+m+"'"+(r<10?'0':'')+r+"''";
}
function isTimeish(t){ return /^\d+$/.test(t)||/^(min|minute|minutes|sec|second|seconds|and)$/.test(t); }
function parseDur(words){
  var mi=0,se=0,ok=false,i=0;
  while(i<words.length){
    if(/^\d+$/.test(words[i])){
      var v=+words[i];
      if(i+1<words.length && /^(min|minute|minutes)$/.test(words[i+1])){ mi=v;i+=2;ok=true; }
      else if(i+1<words.length && /^(sec|second|seconds)$/.test(words[i+1])){ se=v;i+=2;ok=true; }
      else if(i+1<words.length && /^\d+$/.test(words[i+1])){ mi=v;se=+words[i+1];i+=2;ok=true; }
      else{ se+=v;i++;ok=true; }
    } else { i++; }
  }
  return ok ? mi*60+se : null;
}

// ════════════════════════════════════════════════
//  UI
// ════════════════════════════════════════════════
function setHeard(t){ document.getElementById('heard').textContent=t||'—'; }

var _flashTO=null;
function flash(txt){
  var el=document.getElementById('cmd-flash');
  el.textContent=txt; el.classList.add('show');
  clearTimeout(_flashTO);
  _flashTO=setTimeout(function(){ el.classList.remove('show'); },900);
}

function render(){
  var seq=S.area?S.seqs[S.area]:[], item=seq[S.idx];
  document.getElementById('area-name').textContent=S.area?S.area.toUpperCase():'—';
  var meta=document.getElementById('meta');
  var pos=seq.length>0?(S.idx+1)+' / '+seq.length:'';
  meta.textContent=S.mode.toUpperCase()+(pos?'  '+pos:'');
  meta.className=S.mode==='running'?'running':'';
  document.getElementById('timer').textContent=fmt(item?item.duration-S.elapsed:0);
  var pct=(item&&item.duration>0)?Math.min(100,(S.elapsed/item.duration)*100):0;
  document.getElementById('progress-fill').style.width=pct+'%';
  document.getElementById('progress-head').style.left=pct+'%';
  document.getElementById('sequence').innerHTML=seq.map(function(s,i){
    var cls=i===S.idx?'current':i<S.idx?'past':'';
    return '<div class="step '+cls+'"><div class="dot"></div>'
      +'<span class="step-idx">'+(i+1)+'</span>'
      +'<span class="step-name">'+(s.name||'—')+'</span>'
      +'<span class="step-dur">'+fmt(s.duration)+'</span></div>';
  }).join('');
}

// ════════════════════════════════════════════════
//  TIMER
// ════════════════════════════════════════════════
function clearTim(){ if(S._tim){ clearInterval(S._tim); S._tim=null; } }

function startTimer(){
  var seq=S.seqs[S.area];
  if(!seq||S.idx>=seq.length) return;
  clearTim(); S.mode='running'; S._base=S.elapsed; S._wall=Date.now();
  var prev=S.elapsed;
  S._tim=setInterval(function(){
    var el=S._base+Math.floor((Date.now()-S._wall)/1000);
    if(el!==prev){
      var dur=seq[S.idx].duration;
      for(var s=prev+1;s<=el;s++){
        if(s>=dur){
          clearTim(); S.elapsed=dur; snd.end();
          var nxt=S.idx+1;
          if(nxt<seq.length){
            S.idx=nxt; S.elapsed=0; S.mode='ready';
            (function(nm){ setTimeout(function(){ say(nm); flash('READY'); render(); },800); }
            )(seq[nxt].name?seq[nxt].name.toLowerCase():'interval '+(nxt+1));
          } else {
            S.elapsed=0; S.mode='idle';
            setTimeout(function(){ say('sequence complete'); flash('DONE'); render(); },800);
          }
          render(); return;
        }
        var pMin=Math.floor((s-1)/60),cMin=Math.floor(s/60);
        if(cMin>pMin&&s>0) snd.minute(); else snd.tick();
      }
      S.elapsed=el; prev=el;
    }
    render();
  },80);
}

function stopTim(){ clearTim(); if(S.mode==='running') S.mode='stopped'; }

// ════════════════════════════════════════════════
//  COMMAND HANDLER
// ════════════════════════════════════════════════
function handle(transcript){
  var raw=transcript.trim();
  if(!raw) return;
  var lo=raw.toLowerCase();
  var words=lo.split(/\s+/).filter(Boolean);
  if(!words.length) return;
  setHeard(raw);

  if(words[0]==='dry'||words[0]==='wet'){
    var a=words[0]; stopTim();
    S.area=a; S.idx=0; S.elapsed=0;
    S.mode=S.seqs[a].length>0?'ready':'idle';
    flash(a.toUpperCase()); say(a); render(); return;
  }
  if(words[0]==='set'){
    if(!S.area){ say('select an area first'); return; }
    var rest=words.slice(1), name=null, timeW=rest;
    if(rest.length>0&&!isTimeish(rest[0])){ name=rest[0].toUpperCase(); timeW=rest.slice(1); }
    var dur=parseDur(timeW);
    if(!dur||dur<=0){ say('invalid time'); return; }
    S.seqs[S.area].push({name:name,duration:dur}); S.mode='ready';
    var fb=name?'set '+name.toLowerCase():'set';
    flash(fb.toUpperCase()); say(fb); render(); return;
  }
  if(words[0]==='then'){ flash('THEN'); say('then'); return; }
  if(words[0]==='go'){
    if(!S.area){ say('select an area first'); return; }
    var seq=S.seqs[S.area];
    if(!seq.length){ say('no intervals set'); return; }
    if(S.idx>=seq.length){ S.idx=0; S.elapsed=0; }
    flash('GO'); say('go'); startTimer(); render(); return;
  }
  if(words[0]==='stop'){ stopTim(); flash('STOP'); say('stop'); render(); return; }
  if(words[0]==='back'){
    if(!S.area) return; stopTim();
    if(S.elapsed>0){ S.elapsed=0; S.mode='ready'; }
    else if(S.idx>0){ S.idx--; S.elapsed=0; S.mode='ready'; }
    var cur=S.seqs[S.area][S.idx];
    flash('BACK'); say(cur&&cur.name?cur.name.toLowerCase():'back'); render(); return;
  }
  if(words[0]==='clear'){
    if(!S.area) return; stopTim();
    S.seqs[S.area]=[]; S.idx=0; S.elapsed=0; S.mode='idle';
    flash('CLEAR'); say('clear'); render(); return;
  }
  // Named interval jump
  if(S.area){
    var q=words.join(' ').toUpperCase(), seqA=S.seqs[S.area], fi=-1;
    for(var i=0;i<seqA.length;i++){ if(seqA[i].name&&seqA[i].name===q){ fi=i; break; } }
    if(fi>=0){ stopTim(); S.idx=fi; S.elapsed=0; S.mode='ready'; flash(seqA[fi].name); say(seqA[fi].name.toLowerCase()); render(); return; }
  }
}

// ════════════════════════════════════════════════
//  SPEECH RECOGNITION
//  Key Safari rules:
//  1. continuous=false (more reliable, we loop via onend)
//  2. Recognition is recreated each session (Safari leaks on reuse)
//  3. mic is aborted before TTS, restarted after
//  4. _sayBusy gate prevents restart while speaking
// ════════════════════════════════════════════════
var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
var _isSafari=/^((?!chrome|android).)*safari/i.test(navigator.userAgent);
var _isIOS=/iP(hone|ad|od)/i.test(navigator.userAgent);

var _recEnabled=false;   // set true after user tap, false on permission denied
var _recLive=false;      // true while a session is actively running
var _recTO=null;         // restart timer

function _micOn(){ document.getElementById('mic-ring').classList.add('on'); }
function _micOff(){ document.getElementById('mic-ring').classList.remove('on'); }

function recAbortForTTS(){
  // Abort current session without clearing _recEnabled.
  // Recognition will restart after TTS via recResumeAfterTTS().
  clearTimeout(_recTO);
  if(_recLive){
    try{ _currentRec && _currentRec.abort(); }catch(e){}
  }
}

function recResumeAfterTTS(){
  if(_recEnabled) _schedRec(_isSafari?100:50);
}

var _currentRec=null;

function _schedRec(ms){
  clearTimeout(_recTO);
  _recTO=setTimeout(function(){ _startRec(); }, ms||0);
}

function _startRec(){
  if(!SR||!_recEnabled||_recLive) return;
  // Recreate the object each time on Safari to avoid state leaks
  var r = new SR();
  r.continuous = false;   // false on all browsers; onend loop handles continuity
  r.interimResults = false;
  r.lang = 'en-US';

  r.onstart = function(){ _recLive=true; _micOn(); };

  r.onend = function(){
    _recLive=false; _micOff();
    // Restart unless TTS is currently speaking (it will call recResumeAfterTTS when done)
    if(_recEnabled && !_sayBusy) _schedRec(_isSafari?400:100);
  };

  r.onerror = function(e){
    _recLive=false; _micOff();
    if(e.error==='not-allowed'||e.error==='service-not-allowed'){
      setHeard('mic denied — use buttons');
      document.getElementById('btn-panel').style.display='grid';
      _recEnabled=false; return;
    }
    if(_recEnabled && !_sayBusy) _schedRec(_isSafari?700:300);
  };

  r.onresult = function(e){
    var last=e.results[e.results.length-1];
    handle(last[0].transcript);
  };

  _currentRec = r;
  try{ r.start(); }catch(e){ _schedRec(500); }
}

function initRec(){
  if(!SR){
    setHeard('speech not supported');
    document.getElementById('btn-panel').style.display='grid';
    return;
  }
  _recEnabled=true;
  setHeard('listening…');
  _schedRec(200);
}

// ════════════════════════════════════════════════
//  BUTTON PANEL FALLBACK
// ════════════════════════════════════════════════
(function(){
  var cmds=['DRY','WET','GO','STOP','BACK','CLEAR'];
  var p=document.getElementById('btn-panel');
  cmds.forEach(function(c){
    var b=document.createElement('button');
    b.textContent=c;
    b.addEventListener('click',function(){ handle(c.toLowerCase()); });
    p.appendChild(b);
  });
})();

// ════════════════════════════════════════════════
//  BOOT
// ════════════════════════════════════════════════
document.getElementById('overlay').addEventListener('click',function(){
  _ctx=new (window.AudioContext||window.webkitAudioContext)();
  if(_ctx.state==='suspended') _ctx.resume();
  document.getElementById('overlay').style.display='none';
  initRec();
  render();
},{once:true});

render();
</script>
</body>
</html>
